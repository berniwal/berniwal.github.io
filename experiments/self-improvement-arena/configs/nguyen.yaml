# Nguyen benchmark (Tier 1+2: Nguyen-1..8, single variable), faithful to DSR.
# Targets auto-select the Koza grammar {+,-,*,/,sin,cos,exp,log,x} (no constant
# terminals; constants are constructed, e.g. 1 = x/x) and their per-benchmark
# sampling ranges (see sia/task.py). RNN arms use DSR Table-3 HPs + the 4 a-priori
# constraints. Compare risk-seeking to DSR's RL-only Nguyen recovery.
#
#   python run_layer0.py --config configs/nguyen.yaml --out results/nguyen --parallel
#
# Nguyen-9..12 (two-variable) are deferred (Tier 3).

budget: 2000000        # DSR runs up to 2M evaluations per benchmark
seeds: 25              # recovery rate over seeds (DSR uses ~100; 25 for a first pass)
log_every: 25
n_points: 20          # DSR Nguyen uses 20 points
x_range: [-1.0, 1.0]  # ignored for nguyen targets (per-benchmark ranges in task.py)
length_penalty: 0.001
eps_success: 1.0e-6   # held-out MSE below this counts as recovery

targets: [nguyen-1, nguyen-2, nguyen-3, nguyen-4, nguyen-5, nguyen-6, nguyen-7, nguyen-8]

methods:
  random:
    proposer: random
    batch_size: 200
    max_depth: 4
  gp:
    proposer: gp
    pop_size: 200
    batch_size: 200
    tournament_size: 5
    crossover_rate: 0.6
    mutation_rate: 0.3
    immigrant_rate: 0.1
    max_depth: 4
    max_complexity: 30
  greedy:
    proposer: greedy
    batch_size: 1000
    hidden: 32
    max_length: 30
    min_length: 4
    constraints: true
    lr: 0.0005
    ent_coef: 0.005
  risk:
    proposer: risk
    batch_size: 1000
    hidden: 32
    max_length: 30
    min_length: 4
    constraints: true
    lr: 0.0005
    ent_coef: 0.005
    mode: quantile
    epsilon: 0.05

quick:
  budget: 40000
  seeds: 2
  log_every: 1
