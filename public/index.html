    <!-- Google Analytics 4 with Consent Mode v2.
         Defaults to denied; ConsentBanner.jsx flips analytics_storage to
         granted once the visitor accepts. Hash-route pageviews are fired
         manually from a React hook in src/App.js. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KYC3H3W1YG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500
      });
      try {
        if (localStorage.getItem('analytics-consent') === 'granted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) {}
      gtag('js', new Date());
      // send_page_view: false → React fires page_view on every HashRouter change
      gtag('config', 'G-KYC3H3W1YG', { send_page_view: false, anonymize_ip: true });
    </script>
